name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.45"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Turbo check-types
        run: bun run check-types

      - name: Turbo build
        run: bun run build

      - name: Build Docker images (web + api)
        run: docker compose build web api
